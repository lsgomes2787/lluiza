<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Tarefas</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeaf4);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
    }

    h1 {
      text-align: center;
      color: #ff4f93;
      margin-bottom: 25px;
      font-size: 32px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 2px solid #ffc2d9;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #ff69b4;
      box-shadow: 0 0 10px rgba(255, 105, 180, 0.2);
    }

    .add-btn {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .add-btn:hover {
      background: #ff4f93;
      transform: scale(1.05);
    }

    ul {
      list-style: none;
    }

    li {
      background: #fff0f6;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .task-text {
      color: #444;
      font-size: 16px;
    }

    .remove-btn {
      background: #ff8db8;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .remove-btn:hover {
      background: #ff4f93;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty-message {
      text-align: center;
      color: #999;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1> Minhas Tarefas</h1>

    <div class="input-area">
      <input
        type="text"
        id="taskInput"
        placeholder="Digite uma tarefa..."
      />

      <button class="add-btn" onclick="addTask()">
        +
      </button>
    </div>

    <ul id="taskList"></ul>

    <p class="empty-message" id="emptyMessage">
      Nenhuma tarefa adicionada
    </p>
  </div>

  <script>
    const taskList = document.getElementById("taskList");
    const emptyMessage = document.getElementById("emptyMessage");

    function updateEmptyMessage() {
      emptyMessage.style.display =
        taskList.children.length === 0
          ? "block"
          : "none";
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      const taskText = input.value.trim();

      if (taskText === "") return;

      const li = document.createElement("li");

      li.innerHTML = `
        <span class="task-text">${taskText}</span>
        <button class="remove-btn" onclick="removeTask(this)">
          Remover
        </button>
      `;

      taskList.appendChild(li);

      input.value = "";

      updateEmptyMessage();
    }

    function removeTask(button) {
      button.parentElement.remove();

      updateEmptyMessage();
    }

    updateEmptyMessage();
  </script>

</body>
</html>
